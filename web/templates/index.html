<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lucent DB Explorer</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <header class="topbar">
    <span class="brand">Lucent DB Explorer</span>
    <input type="hidden" id="connection_url" value="{{ default_connection or '' }}">
    <span id="current_conn" class="current-conn"></span>
    <select id="topbar_conn" class="topbar-conn" title="Gespeicherte Verbindung wählen und verbinden">
      <option value="">— gespeicherte Verbindung —</option>
    </select>
    <button id="btn_load">Verbinden</button>
    <button id="btn_connections">Verbindungen…</button>
    <label class="impl"><input type="checkbox" id="include_implied"> implizite FKs</label>
    <span id="status" class="status"></span>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <input type="search" id="obj_search" class="obj-search"
             placeholder="Tabellen/Views filtern…" autocomplete="off">
      <div id="objects" class="objects">
        <p class="hint">Verbinden, um Tabellen und Views zu laden.</p>
      </div>
    </aside>

    <div class="splitter splitter-left" id="splitter_left" title="Ziehen zum Verschieben (Sidebar-Breite)"></div>

    <main class="main">
      <div class="tabbar" id="tabbar"></div>
      <div class="tabpanels" id="tabpanels"></div>
    </main>

    <div class="splitter" id="splitter" title="Ziehen zum Verschieben"></div>

    <section class="graphpanel">
      <div class="panelhead">Schema-Graph
        <button id="graph_relayout" type="button" title="Graph neu anordnen">Neu anordnen</button>
      </div>
      <div id="graph"></div>
      <div id="zoom_ctrl" title="Zoom (Scrollen zoomt feinstufig)">
        <input id="zoom_slider" type="range" min="10" max="400" step="5" value="100"
               orient="vertical" aria-label="Zoom">
        <span id="zoom_pct">100%</span>
      </div>
      <div id="uml_area">
        <div id="uml_bar">
          <span id="uml_status"></span>
          <button id="uml_reset">Auswahl zurücksetzen</button>
        </div>
        <div id="uml_cards"></div>
      </div>
    </section>
  </div>

  <script src="/static/lib/cytoscape.min.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>

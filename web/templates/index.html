<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lucent DB Explorer</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <header class="topbar">
    <span class="brand">Lucent DB Explorer</span>
    <input type="text" id="connection_url" placeholder="sqlite:///inventory.db"
           value="{{ default_connection or '' }}">
    <button id="btn_load">Verbinden</button>
    <label class="impl"><input type="checkbox" id="include_implied"> implizite FKs</label>
    <span id="status" class="status"></span>
  </header>

  <div class="layout">
    <aside class="sidebar" id="objects">
      <p class="hint">Verbinden, um Tabellen und Views zu laden.</p>
    </aside>

    <main class="main">
      <div class="tabbar" id="tabbar"></div>
      <div class="tabpanels" id="tabpanels"></div>
    </main>

    <section class="graphpanel">
      <div class="panelhead">Schema-Graph</div>
      <div id="graph"></div>
    </section>
  </div>

  <script src="/static/lib/cytoscape.min.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
